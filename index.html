<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artale 墊卷計算器</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent-green: #2ecc71;
            --accent-red: #ff4757;
            --accent-blue: #3498db;
            --accent-yellow: #f1c40f;
            --border-color: #333;
        }

        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); }
        
        h2 { text-align: center; color: var(--accent-blue); margin-bottom: 25px; font-weight: 300; letter-spacing: 3px; }

        /* 即時監測儀錶板 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .stat-label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 8px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }

        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 25px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        input { padding: 12px; background: #000; border: 1px solid var(--border-color); border-radius: 6px; width: 70px; color: var(--accent-yellow); font-size: 1.1rem; text-align: center; }
        
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-fail { background: var(--accent-red); color: white; }
        .btn-success { background: var(--accent-green); color: #000; }
        .btn-reset { background: #444; color: #ccc; font-size: 0.8rem; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #252525; color: #777; padding: 12px; border-bottom: 2px solid var(--border-color); text-align: center; }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; }
        
        .footer { margin-top: 25px; text-align: right; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARTALE SCROLL TRACKER</h2>
    
    <div class="dashboard">
        <div class="stat-box">
            <span class="stat-label">失敗次數</span>
            <span id="currentWait" class="stat-value" style="color:var(--accent-red)">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">單次成功率</span>
            <span id="realtimeRate" class="stat-value" style="color:var(--accent-yellow)">0.00%</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">成功次數</span>
            <span id="totalSuccDisplay" class="stat-value" style="color:var(--accent-green)">0</span>
        </div>
    </div>

    <div class="controls">
        <input type="number" id="tries" value="1" min="1">
        <button class="btn-fail" onclick="addFail()">失敗</button>
        <button class="btn-success" onclick="addSuccess()">成功</button>
        <button class="btn-reset" onclick="if(confirm('確定重置？')) location.reload()">重置</button>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>#</th>
                <th>此次墊卷數量(n)</th>
                <th>單次成功率(1/墊了幾張會成功)</th>
                <th>累計墊卷數</th>
                <th>總成功率</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="footer">Author: jimmytsai | v8.0 Dark Precision</div>
</div>

<script>
    let totalConsumes = 0;
    let totalSuccess = 0;
    let currentWait = 0;

    function updateDashboard() {
        document.getElementById('currentWait').innerText = currentWait;
        document.getElementById('totalSuccDisplay').innerText = totalSuccess;
        
        // 即時計算總成功率 (避免除以 0)
        const rate = totalConsumes > 0 ? ((totalSuccess / totalConsumes) * 100).toFixed(2) : "0.00";
        document.getElementById('realtimeRate').innerText = rate + "%";
    }

    function addFail() {
        const val = parseInt(document.getElementById('tries').value);
        if (isNaN(val) || val <= 0) return;
        
        currentWait += val;
        totalConsumes += val;
        updateDashboard();
        document.getElementById('tries').value = 1;
    }

    function addSuccess() {
        const val = parseInt(document.getElementById('tries').value);
        if (isNaN(val) || val <= 0) return;

        currentWait += val;
        totalConsumes += val;
        totalSuccess++;

        const singleRate = ((1 / currentWait) * 100).toFixed(2) + '%';
        const finalRate = ((totalSuccess / totalConsumes) * 100).toFixed(2) + '%';

        const tbody = document.getElementById('recordTable').querySelector('tbody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${totalSuccess}</td>
            <td style="color:var(--accent-green)">${currentWait}</td>
            <td style="color:var(--accent-blue)">${singleRate}</td>
            <td>${totalConsumes}</td>
            <td style="color:var(--accent-yellow)">${finalRate}</td>
        `;

        currentWait = 0;
        updateDashboard();
        document.getElementById('tries').value = 1;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
